<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RegentVPN — Быстрое подключение</title>
    <style>
        body {
            background: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            max-width: 400px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { margin-bottom: 10px; font-size: 24px; color: #ffcd00; }
        p { color: #aaaaaa; font-size: 14px; line-height: 1.5; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background: #007aff;
            color: white;
            text-decoration: none;
            padding: 16px 30px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
            width: 100%;
            box-sizing: border-box;
        }
        .btn:active { background: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ RegentVPN</h2>
    <p>Нажмите синюю кнопку ниже, чтобы автоматически перенести настройки доступа в официальное приложение WireGuard.</p>
    
    <a href="#" id="wgLink" class="btn">🚀 НАСТРОИТЬ В 1 КЛИК</a>
</div>

<script>
    // Извлекаем параметры из адресной строки (?config=...)
    var query = window.location.search.substring(1);
    if (query) {
        // Формируем прямую deep link ссылку для WireGuard
        document.getElementById("wgLink").href = "wireguard://import-config?" + query;
    }
</script>

</body>
</html>
